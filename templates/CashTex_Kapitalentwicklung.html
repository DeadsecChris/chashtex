<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>CashTex - Kapitalentwicklung</title>
    <style>
        body{
            font-family:Arial, sans-serif;
            background:#0b1120;
            color:white;
            margin:0;
        }

        .container{
            max-width:1100px;
            margin:auto;
            padding:30px 20px;
        }

        .card{
            background:#111827;
            padding:24px;
            border-radius:14px;
            margin-bottom:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        h1{
            margin-top:0;
        }

        .chart-image{
            width:100%;
            max-width:950px;
            display:block;
            margin:20px auto;
            border-radius:12px;
            background:#111827;
            border:1px solid #334155;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        th,td{
            padding:12px;
            border-bottom:1px solid #334155;
            text-align:right;
        }

        th{
            background:#1f2937;
        }

        td:first-child, th:first-child{
            text-align:left;
        }

        .button-row{
            display:flex;
            gap:12px;
            flex-wrap:wrap;
            margin-top:20px;
        }

        button, .link-button{
            padding:12px 18px;
            background:#38bdf8;
            color:#0b1120;
            border:none;
            border-radius:10px;
            font-weight:bold;
            cursor:pointer;
            text-decoration:none;
            display:inline-block;
        }

        .secondary{
            background:#1e293b;
            color:white;
            border:1px solid #334155;
        }

        .hint{
            color:#cbd5e1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Kapitalentwicklung</h1>

            {% if yearly_data %}
                <img src="{{ url_for('static', filename='kapitalentwicklung.png') }}"
                     alt="Kapitalentwicklung"
                     class="chart-image">

                <table>
                    <thead>
                        <tr>
                            <th>Jahr</th>
                            <th>Einzahlungen</th>
                            <th>Kapitalwert</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for row in yearly_data %}
                        <tr>
                            <td>{{ row.year }}</td>
                            <td>{{ row.invested }} €</td>
                            <td>{{ row.capital }} €</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            {% else %}
                <p class="hint">Es sind noch keine Daten vorhanden. Bitte zuerst eine Berechnung durchführen.</p>
            {% endif %}

            <div class="button-row">
                <a class="link-button secondary" href="/berechnen">Zurück zur Berechnung</a>
            </div>
        </div>
    </div>
</body>
</html>
