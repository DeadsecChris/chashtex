<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Anmelden</title>
    <style>
    body{font-family:Arial, sans-serif;background:#0b1120;color:white;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;}
    .card{background:#111827;padding:30px;border-radius:12px;width:380px;box-shadow:0 0 20px rgba(0,0,0,0.5);}
    h2{margin-top:0;text-align:center;}
    input{width:100%;padding:10px;margin-bottom:15px;border-radius:8px;border:none;box-sizing:border-box;}
    button{width:100%;padding:12px;background:#38bdf8;border:none;border-radius:8px;font-weight:bold;cursor:pointer;}
    button:hover{background:#0ea5e9;}
    .back-link{text-align:center;margin-top:15px;}
    .back-link a{color:#38bdf8;text-decoration:none;}
    </style>
</head>
<body>
<div class="card">
    <h2>Anmelden</h2>
    {% if error_message %}
        <div class="error" style="background:#7f1d1d;color:#fecaca;padding:10px;border-radius:8px;margin-bottom:15px;">{{ error_message }}</div>
    {% endif %}
    <form method="POST" action="/login">
        <input type="text" name="Benutzername" placeholder="Benutzername" required>
        <input type="password" name="Passwort" placeholder="Passwort" required>
        <button type="submit">Einloggen</button>
    </form>
    <div class="back-link">
        <a href="/berechnen">⬅ Zurück zur Berechnung</a>
    </div>
</div>
</body>
</html>
