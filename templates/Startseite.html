<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>CashTex - Startseite</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#0b1120;
            color:white;
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .card{
            background:#111827;
            padding:40px;
            border-radius:16px;
            max-width:700px;
            width:90%;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        h1{
            margin-top:0;
            margin-bottom:20px;
        }

        p{
            font-size:18px;
            line-height:1.6;
            color:#cbd5e1;
            margin-bottom:0;
        }

        a{
            text-decoration:none;
        }

        button{
            margin-top:25px;
            padding:14px 28px;
            background:#38bdf8;
            color:#0b1120;
            border:none;
            border-radius:10px;
            font-weight:bold;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            opacity:0.95;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Wichtiger Hinweis</h1>
        <p>Wir sind keine Bank, somit bieten wir keine Kauf- und Verkaufsoption.</p>
        <a href="/berechnen">
            <button type="button">Okay</button>
        </a>
    </div>
</body>
</html>
